<html>
<head>
    <title>Sample Form Demo</title>
</head>
<body bgcolor="#ffffcc">
    <table align="center" border="1" cellpadding="20">
        <tr><td>
            <form action="form2.html" method="get">
                <h2>Sample Stock Recovery</h2>
                <p><b>Describe your investment experience:</b></p>
                <input type="radio" name="exp" value="0"> Beginner<br>
                <input type="radio" name="exp" value="1"> Intermediate<br>
                <input type="radio" name="exp" value="2"> Expert

                <p><b>Types of investments you make:</b></p>
                <input type="checkbox" name="c1"> Individual stocks<br>
                <input type="checkbox" name="c2"> Options<br>
                <input type="checkbox" name="c3"> Mutual funds

                <p>First Name: <input type="text" name="first" size="20"></p>
                <p>Password: <input type="password" name="pass" size="10" maxlength="15"></p>
                
                <input type="submit" value="Next Page"> 
                <input type="reset" value="Clear Form">
            </form>
        </td></tr>
    </table>
</body>
</html>
